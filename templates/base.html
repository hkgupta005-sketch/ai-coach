<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}AI Interview & Resume Coach{% endblock %}</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<!-- App styles -->
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
{% block extra_css %}{% endblock %}

<!-- Prevent theme flash: apply saved theme before paint -->
<script>
  (function(){
    var t = localStorage.getItem('aicoach-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', t);
  })();
</script>
</head>
<body>

<!-- Opening interactive interface -->
<div id="intro-overlay">
  <div class="intro-inner">
    <div class="intro-orb"></div>
    <div class="intro-title">COACH<span class="grad">AI</span></div>
    <div class="intro-bar"><div class="intro-fill" id="intro-fill"></div></div>
    <div class="intro-pct" id="intro-pct">0%</div>
    <div class="intro-hint">Click anywhere to enter</div>
  </div>
</div>

<!-- Ambient layers -->
<div id="tsparticles"></div>
<div class="bg-blobs"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div></div>
<div id="cursor-glow"></div>

<!-- Navbar -->
<nav class="navbar navbar-glass navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2" href="{{ url_for('index') }}">
      <span class="brand-mark">AI</span>
      <span class="font-display fw-bold">CoachAI</span>
    </a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
      <i class="bi bi-list fs-2" style="color:var(--text-primary);"></i>
    </button>
    <div class="collapse navbar-collapse justify-content-end" id="navMain">
      <ul class="navbar-nav align-items-lg-center gap-1">
        <li class="nav-item"><a class="nav-link nav-link-custom {% if active=='home' %}active{% endif %}" href="{{ url_for('index') }}">Home</a></li>
        <li class="nav-item"><a class="nav-link nav-link-custom {% if active=='upload' %}active{% endif %}" href="{{ url_for('upload') }}">Upload</a></li>
        <li class="nav-item"><a class="nav-link nav-link-custom {% if active=='interview' %}active{% endif %}" href="{{ url_for('interview') }}">Mock Interview</a></li>
        <li class="nav-item"><a class="nav-link nav-link-custom {% if active=='chat' %}active{% endif %}" href="{{ url_for('chat') }}">AI Chat</a></li>
        <li class="nav-item"><a class="nav-link nav-link-custom {% if active=='dashboard' %}active{% endif %}" href="{{ url_for('dashboard') }}">Dashboard</a></li>
        <li class="nav-item ms-lg-3"><div class="theme-toggle" id="theme-toggle"><div class="knob">🌙</div></div></li>
      </ul>
    </div>
  </div>
</nav>

<main style="position:relative; z-index:2;">
  {% block content %}{% endblock %}
</main>

<!-- Footer -->
<footer class="footer">
  <div class="container d-flex flex-wrap justify-content-between align-items-center gap-3">
    <div class="d-flex align-items-center gap-2">
      <span class="brand-mark">AI</span>
      <span class="font-display fw-bold">CoachAI</span>
    </div>
    <div class="text-muted-c small">Built to help you land the offer. &copy; 2026 CoachAI.</div>
    <div class="d-flex gap-3">
      <a href="#" class="text-muted-c"><i class="bi bi-twitter-x"></i></a>
      <a href="#" class="text-muted-c"><i class="bi bi-linkedin"></i></a>
      <a href="#" class="text-muted-c"><i class="bi bi-github"></i></a>
    </div>
  </div>
</footer>

<!-- AI Assistant Pet -->
<div id="ai-pet-wrap">
  <div id="ai-pet" title="Chat with your AI Coach">
    <div class="eye l"></div><div class="eye r"></div><div class="mouth"></div>
  </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tsparticles/all@3/tsparticles.all.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
